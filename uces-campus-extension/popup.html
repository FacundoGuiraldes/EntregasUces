<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UCES Importador</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <h1>UCES Importador</h1>
      <p>
        Usalo desde la sección <strong>ACTIVIDADES</strong> de Campus UCES para enviar
        solo las actividades próximas a tu app.
      </p>

      <button id="syncBtn" type="button">Importar actividades próximas</button>
      <p id="status" class="status">Esperando acción.</p>

      <ol>
        <li>Abrí Campus UCES.</li>
        <li>Entrá a <strong>ACTIVIDADES</strong>.</li>
        <li>Hacé clic en este botón.</li>
      </ol>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
